<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ゆうき銀行 - ログイン</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: var(--bg-hero); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-container { width: 100%; max-width: 360px; padding: 24px; }
    .login-logo { text-align: center; margin-bottom: 40px; }
    .login-logo-text { font-size: 28px; font-weight: 700; color: var(--text-on-dark); }
    .login-logo-sub { font-size: 13px; color: var(--text-on-dark-muted); margin-top: 4px; }
    .login-card {
      background: var(--bg-card); border-radius: var(--radius-lg); padding: 28px 24px;
      box-shadow: var(--shadow-lg);
    }
    .login-group { margin-bottom: 18px; }
    .login-label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--text-secondary); }
    .login-input {
      width: 100%; padding: 12px 14px; border: 1.5px solid rgba(0,0,0,0.12); border-radius: var(--radius-sm);
      font-size: 15px; font-family: inherit; background: var(--bg-body);
    }
    .login-input:focus { outline: none; border-color: var(--accent-bright); box-shadow: 0 0 0 3px rgba(67,97,238,0.1); }
    .login-btn {
      display: block; width: 100%; padding: 14px; border: none; border-radius: var(--radius-md);
      background: var(--accent-bright); color: #fff; font-size: 16px; font-weight: 600; cursor: pointer;
      margin-top: 8px;
    }
    .login-btn:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-logo">
      <div class="login-logo-text" data-label="app_name">ゆうき銀行</div>
      <div class="login-logo-sub">ログインしてください</div>
    </div>
    <div class="login-card">
      <div class="login-group">
        <label class="login-label">ユーザー名</label>
        <input type="text" class="login-input" placeholder="ユーザー名を入力" value="yuki">
      </div>
      <div class="login-group">
        <label class="login-label">パスワード</label>
        <input type="password" class="login-input" placeholder="パスワードを入力" value="yukipass">
      </div>
      <button class="login-btn" onclick="location.href='home.html'">ログイン</button>
    </div>
  </div>
  <script src="js/theme.js"></script>
</body>
</html>
