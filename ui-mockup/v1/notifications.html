<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ゆうき銀行 - 通知設定</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/settings.css">
  <style>.app-container { max-width: 480px; }</style>
</head>
<body>
  <div class="app-container">
    <div class="page-header">
      <a href="javascript:history.back()" class="page-back-btn">‹</a>
      <div class="page-title">通知設定</div>
    </div>
    <div class="settings-desc">各種通知のオン・オフを管理できます。</div>
    <div class="settings-section">
      <div class="settings-card">
        <div class="settings-row">
          <span class="settings-row-label">承認待ち通知</span>
          <label class="toggle"><input type="checkbox" checked><span class="toggle-slider"></span></label>
        </div>
        <div class="settings-row">
          <span class="settings-row-label">承認完了通知</span>
          <label class="toggle"><input type="checkbox" checked><span class="toggle-slider"></span></label>
        </div>
        <div class="settings-row">
          <span class="settings-row-label">差し戻し通知</span>
          <label class="toggle"><input type="checkbox" checked><span class="toggle-slider"></span></label>
        </div>
        <div class="settings-row">
          <span class="settings-row-label">チャージ完了通知</span>
          <label class="toggle"><input type="checkbox"><span class="toggle-slider"></span></label>
        </div>
        <div class="settings-row">
          <span class="settings-row-label">残高アラート</span>
          <label class="toggle"><input type="checkbox"><span class="toggle-slider"></span></label>
        </div>
        <div class="settings-row">
          <span class="settings-row-label">ポイント付与通知</span>
          <label class="toggle"><input type="checkbox" checked><span class="toggle-slider"></span></label>
        </div>
        <div class="settings-row">
          <span class="settings-row-label">月次レポート</span>
          <label class="toggle"><input type="checkbox"><span class="toggle-slider"></span></label>
        </div>
      </div>
    </div>
    <div style="height:24px;"></div>
  </div>
  <div data-component="bottom-nav" data-active="account"></div>
  <script src="js/theme.js"></script>
  <script src="js/components.js"></script>
</body>
</html>
