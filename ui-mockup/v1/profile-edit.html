<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ゆうき銀行 - プロフィール編集</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/settings.css">
  <style>
    .app-container { max-width: 480px; }
    .avatar-edit { text-align: center; padding: 16px 0 24px; }
    .avatar-large {
      width: 80px; height: 80px; border-radius: 50%; background: var(--accent-gradient);
      color: #fff; display: inline-flex; align-items: center; justify-content: center;
      font-size: 32px; font-weight: 700; margin-bottom: 8px;
    }
    .avatar-change-btn {
      display: block; margin: 0 auto; font-size: 13px; color: var(--accent-bright);
      background: none; border: none; cursor: pointer; font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="page-header">
      <a href="javascript:history.back()" class="page-back-btn">‹</a>
      <div class="page-title">プロフィール編集</div>
    </div>
    <div class="avatar-edit">
      <div class="avatar-large">ゆ</div>
      <button class="avatar-change-btn">アイコンを変更</button>
    </div>
    <div class="settings-section">
      <div class="settings-group">
        <label class="settings-group-label">表示名</label>
        <input type="text" class="settings-input" value="ゆうき">
      </div>
      <div class="settings-group">
        <label class="settings-group-label">ユーザー名</label>
        <input type="text" class="settings-input" value="yuki" disabled style="opacity:0.5;">
      </div>
      <div class="settings-group">
        <label class="settings-group-label">ロール</label>
        <input type="text" class="settings-input" value="main（メインユーザー）" disabled style="opacity:0.5;">
      </div>
      <button class="settings-save-btn" onclick="alert('モック: 保存')">保存する</button>
    </div>
    <div style="height:24px;"></div>
  </div>
  <div data-component="bottom-nav" data-active="account"></div>
  <script src="js/theme.js"></script>
  <script src="js/components.js"></script>
</body>
</html>
