<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ゆうき銀行 - ガチャコイン</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/taxonomy-detail.css">
  <style>.app-container { max-width: 480px; }</style>
</head>
<body>
  <div class="app-container">
    <div class="page-header">
      <a href="javascript:history.back()" class="page-back-btn">‹</a>
      <div class="page-title" data-label="home_coins_label">ガチャコイン</div>
    </div>
    <div class="tax-hero">
      <div class="tax-balance">350 <span class="tax-unit">枚</span></div>
      <div class="tax-actions">
        <a href="create-charge.html" class="tax-action-btn primary">購入</a>
        <a href="tool-coin-exchange.html" class="tax-action-btn">交換</a>
      </div>
    </div>
    <div class="history-section">
      <div class="history-date-group">2026年3月</div>
      <div class="tx-list">
        <a href="transaction-detail.html?id=tx-c001" class="tx-item">
          <div class="tx-icon minus">↓</div>
          <div class="tx-info"><div class="tx-label">ガチャ SR当たり</div><div class="tx-meta">使用 — 3/28</div></div>
          <div class="tx-amount minus">-10 枚</div>
        </a>
        <a href="transaction-detail.html?id=tx-c002" class="tx-item">
          <div class="tx-icon plus">↑</div>
          <div class="tx-info"><div class="tx-label">購入 50枚パック</div><div class="tx-meta">チャージ — 3/26</div></div>
          <div class="tx-amount plus">+50 枚</div>
        </a>
        <a href="transaction-detail.html?id=tx-c003" class="tx-item">
          <div class="tx-icon minus">↓</div>
          <div class="tx-info"><div class="tx-label">ガチャ 3回</div><div class="tx-meta">使用 — 3/22</div></div>
          <div class="tx-amount minus">-30 枚</div>
        </a>
        <a href="transaction-detail.html?id=tx-c004" class="tx-item">
          <div class="tx-icon plus">↑</div>
          <div class="tx-info"><div class="tx-label">デイリーボーナス</div><div class="tx-meta">付与 — 3/20</div></div>
          <div class="tx-amount plus">+5 枚</div>
        </a>
        <a href="transaction-detail.html?id=tx-c005" class="tx-item">
          <div class="tx-icon plus">↑</div>
          <div class="tx-info"><div class="tx-label">購入 100枚パック</div><div class="tx-meta">チャージ — 3/15</div></div>
          <div class="tx-amount plus">+100 枚</div>
        </a>
      </div>
    </div>
    <div style="height:24px;"></div>
  </div>
  <div data-component="bottom-nav" data-active=""></div>
  <script src="js/theme.js"></script>
  <script src="js/components.js"></script>
</body>
</html>
