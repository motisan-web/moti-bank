<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ゆうき銀行 - JSON作成</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/settings.css">
  <style>
    .app-container { max-width: 480px; }
    .json-type-tabs { display: flex; gap: 6px; padding: 0 16px 16px; }
    .json-type-tab {
      flex: 1; padding: 10px; border-radius: var(--radius-sm); border: 1.5px solid rgba(0,0,0,0.1);
      background: var(--bg-card); font-size: 13px; font-weight: 500; text-align: center;
      cursor: pointer; transition: all 0.15s; color: var(--text-secondary);
    }
    .json-type-tab.active { background: var(--accent-bright); color: #fff; border-color: var(--accent-bright); }
    .json-preview {
      background: #1a1a2e; color: #4cc9f0; padding: 16px; border-radius: var(--radius-sm);
      font-family: 'Courier New', monospace; font-size: 11px; line-height: 1.6;
      white-space: pre-wrap; word-break: break-all; max-height: 300px; overflow-y: auto;
    }
    .json-actions { display: flex; gap: 8px; margin-top: 12px; }
    .json-action-btn {
      flex: 1; padding: 10px; border-radius: var(--radius-sm); border: none; font-size: 13px;
      font-weight: 600; cursor: pointer;
    }
    .json-action-btn.copy { background: var(--accent-bright); color: #fff; }
    .json-action-btn.download { background: rgba(0,0,0,0.06); color: var(--text-primary); }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="page-header">
      <a href="javascript:history.back()" class="page-back-btn">‹</a>
      <div class="page-title">JSON作成</div>
    </div>
    <div class="settings-desc">トランザクションや資料データのJSONテンプレートを生成します。</div>

    <div class="json-type-tabs">
      <button class="json-type-tab active">トランザクション</button>
      <button class="json-type-tab">資料データ</button>
    </div>

    <div class="settings-section">
      <div class="settings-group">
        <label class="settings-group-label">プレビュー</label>
        <div class="json-preview">{
  "amount": 1000,
  "direction": "minus",
  "category": "payment",
  "sub_category": "food",
  "taxonomy_id": null,
  "label": "コンビニ 食料品",
  "location": null,
  "memo": null,
  "meta": null
}</div>
        <div class="json-actions">
          <button class="json-action-btn copy" onclick="alert('コピーしました')">コピー</button>
          <button class="json-action-btn download" onclick="alert('ダウンロード')">ダウンロード</button>
        </div>
      </div>
    </div>
    <div style="height:24px;"></div>
  </div>
  <div data-component="bottom-nav" data-active="tools"></div>
  <script src="js/theme.js"></script>
  <script src="js/components.js"></script>
  <script>
    document.querySelectorAll('.json-type-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.json-type-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
      });
    });
  </script>
</body>
</html>
