<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ゆうき銀行 - セキュリティとプライバシー</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/settings.css">
  <style>.app-container { max-width: 480px; }
  .section-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); padding: 8px 16px; }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="page-header">
      <a href="javascript:history.back()" class="page-back-btn">‹</a>
      <div class="page-title">セキュリティとプライバシー</div>
    </div>

    <div class="section-label">パスワード</div>
    <div class="settings-section">
      <div class="settings-card">
        <div class="settings-row">
          <span class="settings-row-label">パスワード変更</span>
          <span class="settings-row-value">›</span>
        </div>
      </div>
    </div>

    <div class="section-label">ログイン端末</div>
    <div class="settings-section">
      <div class="settings-card">
        <div class="device-item">
          <span class="device-icon">💻</span>
          <div class="device-info">
            <div class="device-name">Chrome — Windows</div>
            <div class="device-meta">最終: 2026/03/31 10:24</div>
          </div>
          <span class="device-current">現在</span>
        </div>
        <div class="device-item">
          <span class="device-icon">📱</span>
          <div class="device-info">
            <div class="device-name">Safari — iPhone</div>
            <div class="device-meta">最終: 2026/03/30 18:45</div>
          </div>
        </div>
        <div class="device-item">
          <span class="device-icon">💻</span>
          <div class="device-info">
            <div class="device-name">Firefox — Mac</div>
            <div class="device-meta">最終: 2026/03/28 09:12</div>
          </div>
        </div>
      </div>
    </div>

    <div class="section-label">ログイン履歴</div>
    <div class="settings-section">
      <div class="settings-card">
        <div class="settings-row">
          <span class="settings-row-label">2026/03/31 10:24</span>
          <span class="settings-row-value">Chrome — 成功</span>
        </div>
        <div class="settings-row">
          <span class="settings-row-label">2026/03/30 18:45</span>
          <span class="settings-row-value">Safari — 成功</span>
        </div>
        <div class="settings-row">
          <span class="settings-row-label">2026/03/29 22:10</span>
          <span class="settings-row-value" style="color:var(--color-minus);">不明 — 失敗</span>
        </div>
        <div class="settings-row">
          <span class="settings-row-label">2026/03/28 09:12</span>
          <span class="settings-row-value">Firefox — 成功</span>
        </div>
      </div>
    </div>
    <div style="height:24px;"></div>
  </div>
  <div data-component="bottom-nav" data-active="account"></div>
  <script src="js/theme.js"></script>
  <script src="js/components.js"></script>
</body>
</html>
